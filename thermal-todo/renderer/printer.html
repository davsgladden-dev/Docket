<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Thermal Todo</title>
    <link rel="stylesheet" href="printer.css">
</head>
<body>

<!-- Custom title bar (since we removed the OS frame) -->
<div class="title-bar">
    <span class="title-bar-text">🖨️ Thermal Todo</span>
    <div class="title-bar-controls">
        <button id="btn-minimize" class="title-btn">─</button>
        <button id="btn-close" class="title-btn title-btn-close">✕</button>
    </div>
</div>

<!-- Printer body -->
<div class="printer-body">

    <!-- Paper roll color selector -->
    <div class="section">
        <label class="section-label">PAPER ROLL</label>
        <div class="color-selector" id="color-selector">
            <!-- Colors will be generated by JS -->
        </div>
    </div>

    <!-- Title input -->
    <div class="section">
        <label class="section-label">TITLE <span class="optional">(optional)</span></label>
        <input type="text" id="ticket-title" class="thermal-input" placeholder="Shopping list..." maxlength="40">
    </div>

    <!-- To-do items -->
    <div class="section">
        <label class="section-label">ITEMS</label>
        <div id="items-container">
            <div class="item-row">
                <input type="text" class="thermal-input item-input" placeholder="Add item..." maxlength="50">
                <button class="remove-item-btn" title="Remove">✕</button>
            </div>
        </div>
        <button id="add-item-btn" class="add-item-btn">+ Add Item</button>
    </div>

    <!-- Paper output slot (animation will happen here) -->
    <div class="paper-slot" id="paper-slot">
        <div class="slot-shadow"></div>
    </div>

    <!-- Print button -->
    <button id="print-btn" class="print-btn">
        🖨️ PRINT
    </button>

</div>

<script src="printer.js"></script>
</body>
</html>
