<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Thermal Todo</title>
    <link rel="stylesheet" href="printer.css">
</head>
<body>
<div class="printer">

    <!-- ── Header / Title Bar ─────────────────────────────── -->
    <header class="printer-header">
        <div class="drag-region"></div>
        <div class="header-brand">
            <span class="brand-icon">🖨️</span>
            <span class="brand-text">THERMAL&nbsp;TODO</span>
        </div>
        <div class="window-controls">
            <button id="btn-minimize" class="win-btn" aria-label="Minimize">
                <span class="win-icon">─</span>
            </button>
            <button id="btn-close" class="win-btn win-close" aria-label="Close">
                <span class="win-icon">✕</span>
            </button>
        </div>
    </header>

    <!-- ── Output Tray (receipt feeds up into here) ───────── -->
    <div class="output-tray" id="output-tray">
        <div class="tray-label">OUTPUT</div>
        <div class="receipt-preview" id="receipt-preview"></div>
    </div>

    <!-- ── Paper Slot ─────────────────────────────────────── -->
    <div class="paper-slot">
        <div class="slot-teeth"></div>
    </div>

    <!-- ── Control Panel ──────────────────────────────────── -->
    <div class="control-panel" id="control-panel">

        <div class="section">
            <label class="section-label">PAPER ROLL</label>
            <div class="color-selector" id="color-selector"></div>
        </div>

        <div class="section">
            <label class="section-label">
                TITLE <span class="optional">(optional)</span>
            </label>
            <input type="text" id="ticket-title" class="thermal-input"
                   placeholder="Shopping list..." maxlength="40">
        </div>

        <div class="section">
            <label class="section-label">ITEMS</label>
            <div id="items-container" class="items-container"></div>
            <button id="add-item-btn" class="add-item-btn">+ Add Item</button>
        </div>

    </div>

    <!-- ── Print Button ───────────────────────────────────── -->
    <div class="print-area">
        <button id="print-btn" class="print-btn">
            <span class="print-label">PRINT</span>
        </button>
    </div>

    <!-- ── Footer ─────────────────────────────────────────── -->
    <footer class="printer-footer">
        <div class="led-group">
            <div class="led" id="led"></div>
            <span class="led-label">PWR</span>
        </div>
        <span class="brand-stamp">THERMAL-TODO™</span>
    </footer>

</div>

<script src="gsap.min.js"></script>
<script src="printer.js"></script>
</body>
</html>
