<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Ticket</title>
    <link rel="stylesheet" href="ticket.css">
</head>
<body>

<div class="ticket" id="ticket">

    <!-- Torn top edge (jagged paper tear) -->
    <div class="ticket-torn-edge" id="torn-edge"></div>

    <!-- Drag handle (invisible, covers top area) -->
    <div class="ticket-drag-handle"></div>

    <!-- Close button -->
    <button class="ticket-close-btn" id="close-btn" title="Discard ticket">✕</button>

    <!-- Content -->
    <div class="ticket-content" id="ticket-content">
        <div class="ticket-title" id="ticket-title"></div>
        <div class="ticket-separator"></div>
        <div class="ticket-items" id="ticket-items"></div>
        <div class="ticket-separator"></div>
        <div class="ticket-timestamp" id="ticket-timestamp"></div>
    </div>

</div>

<script src="gsap.min.js"></script>
<script src="confetti.min.js"></script>
<script src="../assets/sounds/sounds.js"></script>
<script src="ticket.js"></script>
</body>
</html>
